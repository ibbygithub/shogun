services:
  traefik:
    image: traefik:v3.6.7
    container_name: platform-traefik
    restart: unless-stopped

    environment:
      - DOCKER_API_VERSION=1.52

    command:
      - --log.level=INFO

      # Docker provider
      - --providers.docker=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false

      # EntryPoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.traefik.address=:8080

      # Dashboard/API
      - --api.dashboard=true
      - --api.insecure=false

      # Access logs
      - --accesslog=true

    ports:
      - "80:80"
      - "443:443"
      # local-only dashboard/API
      - "127.0.0.1:8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - platform_net

    labels:
      - traefik.enable=true

      # Dashboard/API on localhost:8080 (no DNS needed)
      - traefik.http.routers.traefik-local.rule=PathPrefix(`/`)
      - traefik.http.routers.traefik-local.entrypoints=traefik
      - traefik.http.routers.traefik-local.service=api@internal

      # Optional Host-based dashboard on :80
      - traefik.http.routers.traefik.rule=Host(`traefik.platform.ibbytech.com`)
      - traefik.http.routers.traefik.entrypoints=web
      - traefik.http.routers.traefik.service=api@internal

  llm-gateway:
    build:
      context: ../../../platform-services/llm-gateway-service
      dockerfile: Dockerfile
    container_name: platform-llm-gateway
    restart: unless-stopped
    env_file:
      - ../../../platform-services/llm-gateway-service/.env
    networks:
      - platform_net
    labels:
      - traefik.enable=true
      - traefik.http.routers.llm.rule=Host(`llm.platform.ibbytech.com`)
      - traefik.http.routers.llm.entrypoints=web
      - traefik.http.services.llm.loadbalancer.server.port=8080

networks:
  platform_net:
    name: platform_net
