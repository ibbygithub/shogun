version: "3.9"

networks:
  platform_net:
    name: platform_net
    driver: bridge

services:
  traefik:
    image: traefik:v3.1
    container_name: platform-traefik
    restart: unless-stopped

    command:
      # Logging
      - --log.level=INFO

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.traefik.address=:8080

      # API / Dashboard
      - --api.dashboard=true

      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik_dynamic_tls.yml:/etc/traefik/dynamic/tls.yml:ro
      - ./certs:/certs:ro

    networks:
      - platform_net

    labels:
      - traefik.enable=true

      # Dashboard HTTP
      - traefik.http.routers.traefik-http.entrypoints=web
      - traefik.http.routers.traefik-http.rule=Host(`traefik.platform.ibbytech.com`)
      - traefik.http.routers.traefik-http.service=api@internal

      # Dashboard HTTPS
      - traefik.http.routers.traefik-https.entrypoints=websecure
      - traefik.http.routers.traefik-https.rule=Host(`traefik.platform.ibbytech.com`)
      - traefik.http.routers.traefik-https.service=api@internal
      - traefik.http.routers.traefik-https.tls=true

  llm-gateway:
    build:
      context: ../../../platform-services/llm-gateway-service
      dockerfile: Dockerfile
    image: compose-llm-gateway
    container_name: platform-llm-gateway
    restart: unless-stopped

    env_file:
      - ../../../platform-services/llm-gateway-service/.env

    networks:
      - platform_net

    labels:
      - traefik.enable=true

      # LLM HTTP
      - traefik.http.routers.llm-http.entrypoints=web
      - traefik.http.routers.llm-http.rule=Host(`llm.platform.ibbytech.com`)
      - traefik.http.routers.llm-http.service=llm
      - traefik.http.services.llm.loadbalancer.server.port=8080

      # LLM HTTPS
      - traefik.http.routers.llm-https.entrypoints=websecure
      - traefik.http.routers.llm-https.rule=Host(`llm.platform.ibbytech.com`)
      - traefik.http.routers.llm-https.service=llm
      - traefik.http.routers.llm-https.tls=true
