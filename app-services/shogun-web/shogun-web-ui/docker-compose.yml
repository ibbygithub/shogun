version: "3.9"

services:
  shogun-web-ui:
    build:
      context: .
      args:
        # Browser-reachable URL baked at build time — must be the public Cloudflare hostname.
        # Internal Docker names (shogun-web-api) are NOT resolvable from the user's browser.
        - NEXT_PUBLIC_API_URL=https://api.shogun.ibbytech.com
    container_name: shogun-web-ui
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3010:3000"
    networks:
      - platform_net

networks:
  platform_net:
    external: true
